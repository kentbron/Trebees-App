	<!DOCTYPE html>
	<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <meta charset="UTF-8">
	    <title th:text="${customer.customer_id} ? 'Edit Customer' : 'Add Customer'">Add Customer</title>
	    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
	</head>
	<body>
	<div class="container">
	    <h1 th:text="${customer.customer_id} ? 'Edit Customer' : 'Add Customer'">Add Customer</h1>
	    <form th:action="${customer.customer_id} ? @{/customers/update/{id}(id=${customer.customer_id}) : @{/customers}" 
	          th:object="${customer}" method="post">
	        <div class="form-group">
	            <label for="name">Name</label>
	            <input type="text" class="form-control" id="name" th:field="*{name}" required>
	        </div>
	        <div class="form-group">
	            <label for="email">Email</label>
	            <input type="email" class="form-control" id="email" th:field="*{email}" required>
	        </div>
	        <div class="form-group">
	            <label for="password">Password</label>
	            <input type="password" class="form-control" id="password" th:field="*{password}" required>
	        </div>
	        <div class="form-group">
	            <label for="address">Address</label>
	            <input type="text" class="form-control" id="address" th:field="*{address}">
	        </div>
	        <button type="submit" class="btn btn-primary">Save</button>
	        <a th:href="@{/customers}" class="btn btn-secondary">Cancel</a>
	    </form>
	</div>
	</body>
	</html>
