<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🧾 Manage Orders</h1>
        <a href="/admin" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>

    <!-- Success Toast Trigger -->
    <div th:if="${success}" id="success-toast" th:data-message="${success}"></div>

    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>Order ID</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Total Price</th>
                <th>Status</th>
                <th>Order Date & Time</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>

            <!-- Group orders by customer -->
            <th:block th:each="entry : ${groupedOrders}">
                <tr class="table-primary">
                    <td colspan="7">
                        <strong th:text="${entry.value[0].customer.name}">Customer Name</strong>
                    </td>
                </tr>

                <tr th:each="order : ${entry.value}" th:attr="data-customer-id=${order.customer.customer_id}">
                    <td th:text="${order.order_id}">#</td>
                    <td th:text="${order.product.productName}">Product Name</td>
                    <td th:text="${order.quantity}">1</td>
                    <td>₱<span th:text="${order.price}">0.00</span></td>
                    <td>
                        <span class="badge bg-warning" th:if="${order.status == 'Pending Approval'}">Pending</span>
                        <span class="badge bg-success" th:if="${order.status == 'Approved'}">Approved</span>
                        <span class="badge bg-danger" th:if="${order.status == 'Declined'}">Declined</span>
                    </td>
                    <td th:text="${#temporals.format(order.orderDateTime, 'MMMM dd, yyyy - hh:mm a')}">Order Date</td>
                    <td>
                        <div th:if="${order.status == 'Pending Approval'}">
                            <form th:action="@{'/admin/orders/approve/' + ${order.order_id}}" method="post" style="display:inline-block;">
                                <button class="btn btn-sm btn-success">Approve</button>
                            </form>
                            <form th:action="@{'/admin/orders/decline/' + ${order.order_id}}" method="post" style="display:inline-block;">
                                <button class="btn btn-sm btn-danger">Decline</button>
                            </form>
                        </div>
                        <span th:if="${order.status != 'Pending Approval'}" class="text-muted">No actions</span>
                    </td>
                </tr>

                <!-- Bulk Approve/Decline Buttons -->
                <tr>
                    <td colspan="7" class="text-end">
                        <button type="button" class="btn btn-outline-success btn-sm me-2"
                                th:onclick="'confirmApproveAll(' + ${entry.value[0].customer.customer_id} + ')'">
                            Approve All
                        </button>
                        <button type="button" class="btn btn-outline-danger btn-sm"
                                th:onclick="'confirmDeclineAll(' + ${entry.value[0].customer.customer_id} + ')'">
                            Decline All
                        </button>
                    </td>
                </tr>
            </th:block>

            </tbody>
        </table>
    </div>

</div>

<!-- Bootstrap JS + SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    function confirmApproveAll(customerId) {
        const pendingOrders = document.querySelectorAll('tr[data-customer-id="' + customerId + '"] .badge.bg-warning');

        if (pendingOrders.length === 0) {
            Swal.fire({
                icon: 'info',
                title: 'No Orders to Approve',
                text: 'There are no pending orders left to approve for this customer.',
                confirmButtonColor: '#3085d6'
            });
            return;
        }

        Swal.fire({
            title: 'Approve All Orders?',
            text: "Are you sure you want to approve all pending orders for this customer?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#198754',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, Approve All'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = '/admin/orders/approveAll/' + customerId;
            }
        });
    }

    function confirmDeclineAll(customerId) {
        const pendingOrders = document.querySelectorAll('tr[data-customer-id="' + customerId + '"] .badge.bg-warning');

        if (pendingOrders.length === 0) {
            Swal.fire({
                icon: 'info',
                title: 'No Orders to Decline',
                text: 'There are no pending orders left to decline for this customer.',
                confirmButtonColor: '#3085d6'
            });
            return;
        }

        Swal.fire({
            title: 'Decline All Orders?',
            text: "Are you sure you want to decline all pending orders for this customer?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, Decline All'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = '/admin/orders/declineAll/' + customerId;
            }
        });
    }

    // Success Toast on Action
    document.addEventListener('DOMContentLoaded', function () {
        const toastDiv = document.getElementById('success-toast');
        if (toastDiv) {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: toastDiv.getAttribute('data-message'),
                showConfirmButton: false,
                timer: 3000
            });
        }
    });
</script>

</body>
</html>
