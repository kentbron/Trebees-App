<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trebees Cafe - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <!-- Logo -->
                    <!-- Changes made by Linzel Marie P. Paciencia -->
                    <!-- Fixed the Logo image -->
                    <div class="text-center mb-4">
                        <img th:src="@{/images/logo.png}" alt="Trebees Logo" class="img-fluid" style="height: 60px;">
                        <h3 class="mt-3">Welcome Back</h3>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/login}" method="post">
                        <!-- Error Message -->
                        <div th:if="${param.error}" class="alert alert-danger">
                            Invalid email or password
                        </div>
                        
                        <!-- Success Message -->
                        <div th:if="${param.registered}" class="alert alert-success">
                            Registration successful! Please login.
                        </div>

                        <!-- Email Field -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Email</label>
                            <input type="email" class="form-control" id="username" name="username" required>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <!-- Remember Me -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <!-- Links -->
                    <div class="mt-3 text-center">
                        <a href="/register" class="text-decoration-none">Create an account</a> 
                 
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
