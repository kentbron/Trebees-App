<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Top-Up Requests</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">💰 Manage Top-Up Requests</h1>
        <a href="/admin" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>

    <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>User</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="topup : ${pendingTopUps}">
            <td th:text="${topup.customer.name}">John Doe</td>
            <td>₱<span th:text="${topup.money}">0.00</span></td>
            <td th:text="${topup.status}">PENDING</td>
            <td>
                <form th:action="@{'/admin/bank-accounts/approve/' + ${topup.bank_id}}" method="post" style="display:inline-block;">
                    <button class="btn btn-sm btn-success">Approve</button>
                </form>
                <form th:action="@{'/admin/bank-accounts/decline/' + ${topup.bank_id}}" method="post" style="display:inline-block;">
                    <button class="btn btn-sm btn-danger">Decline</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
