<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="alert alert-success">
            <h4>Welcome, <span th:text="${username}"></span>!</h4>
            <p>You have successfully logged into the Trebees Cafe Admin Panel</p>
        </div>
        
        <div class="list-group">
            <a href="/admin/customers" class="list-group-item list-group-item-action">
                Manage Customers
            </a>
            <a href="/admin/products" class="list-group-item list-group-item-action">
                Manage Products
            </a>
            <a href="/admin/orders" class="list-group-item list-group-item-action">
                View Orders
            </a>
                <a href="/admin/bank-accounts" class="list-group-item list-group-item-action">
   			     Manage Top-Up Requests
   		    </a>
            
            <a href="/logout" class="list-group-item list-group-item-action text-danger">
                Logout
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
