<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trebees Cafe - Welcome</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f9f9f9;
        }
        .hero {
            padding: 80px 20px;
            text-align: center;
            background-color: #fff8e1;
            border-radius: 12px;
            margin-top: 60px;
        }
        .hero h1 {
            font-size: 3rem;
        }
        .hero p {
            font-size: 1.2rem;
            color: #555;
        }
        .btn-group .btn {
            margin: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Welcome to Trebees Cafe</h1>
        <p>Your cashless café ordering experience made simple.</p>

        <div class="btn-group mt-4">
            <a href="/login" class="btn btn-primary btn-lg">Login</a>
            <a href="/register" class="btn btn-outline-success btn-lg">Register</a>
        </div>

        <div class="mt-5">
            <h4>Why Trebees Cafe?</h4>
            <ul class="list-unstyled">
                <li>✅ Seamless online ordering</li>
                <li>✅ Top-up balance system with approval</li>
                <li>✅ Admin & User dashboards</li>
                <li>✅ Transparent transaction tracking</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
