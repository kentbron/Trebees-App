<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Management - Trebees Cafe</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .confirm-delete {
            cursor: pointer;
        }
        /* Toast container */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
        }
    </style>
</head>
<body>
<div class="container mt-5">

    <!-- Toast Container -->
    <div class="toast-container">
        <div th:if="${error}" class="toast align-items-center text-bg-danger border-0 show" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <span th:switch="${error}">
                        <span th:case="'admin_edit_not_allowed'">❌ Admin account cannot be edited!</span>
                        <span th:case="'admin_delete_not_allowed'">❌ Admin account cannot be deleted!</span>
                        <span th:case="'not_found'">⚠️ Customer not found!</span>
                        <span th:case="*">⚠️ Something went wrong!</span>
                    </span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👥 Customer Management</h2>
        <a href="/admin" class="btn btn-outline-secondary">&larr; Back to Dashboard</a>
    </div>

    <div class="mb-3 text-end">
        <a th:href="@{/customers/add}" class="btn btn-success">+ Add New Customer</a>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="customer : ${customers}">
                <td th:text="${customer.customer_id}"></td>
                <td th:text="${customer.name}"></td>
                <td th:text="${customer.email}"></td>
                <td th:text="${customer.address}"></td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:if="${!customer.isAdmin}" 
                           th:href="@{/customers/edit/{id}(id=${customer.customer_id})}" 
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:if="${!customer.isAdmin}" 
                           th:href="@{/customers/delete/{id}(id=${customer.customer_id})}" 
                           class="btn btn-danger btn-sm confirm-delete">Delete</a>

                        <span th:if="${customer.isAdmin}" class="badge bg-secondary">Protected</span>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(customers)}">
                <td colspan="5" class="text-muted">No customers found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const deleteButtons = document.querySelectorAll('.confirm-delete');
        deleteButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const shouldDelete = confirm('Are you sure you want to delete this customer?');
                if (shouldDelete) {
                    window.location.href = this.getAttribute('href');
                }
            });
        });

        // Auto-hide the toast after 3 seconds
        const toastEl = document.querySelector('.toast');
        if (toastEl) {
            setTimeout(() => {
                const bsToast = bootstrap.Toast.getOrCreateInstance(toastEl);
                bsToast.hide();
            }, 3000);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
