<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${customer.customer_id} != null ? 'Edit Customer' : 'Add Customer'">Customer Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${customer.customer_id} != null ? 'Edit Customer' : 'Add Customer'"></h1>

    <form th:action="@{/customers/save}" th:object="${customer}" method="post">
        <input type="hidden" th:field="*{customer_id}">

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
            <small class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" 
                   th:required="${customer.customer_id == null}" 
                   class="form-control">
            <small class="form-text text-muted">
                <span th:if="${customer.customer_id != null}">Leave blank if you don't want to change the password.</span>
            </small>
            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" th:field="*{address}" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/customers}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
