<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Checkout Product</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div class="container mt-5">
    <h2>🛒 Confirm Your Order</h2>

    <!-- hidden values for JS -->
    <div id="availableBalance" th:text="${balance}" style="display:none;"></div>
    <div id="unitPrice"        th:text="${product.price}" style="display:none;"></div>

    <form id="checkoutForm"
          th:action="@{/user/checkout/confirm}"
          method="post">
      <input type="hidden" name="productName"
             th:value="${product.productName}" />

      <div class="mb-3">
        <label class="form-label">Product:</label>
        <div class="form-control"
             readonly
             th:text="${product.productName}">Coffee</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Price per Unit:</label>
        <div class="form-control">
          ₱<span th:text="${product.price}">0.00</span>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Quantity:</label>
        <input type="number"
               id="quantity"
               name="quantity"
               value="1"
               min="1"
               class="form-control"
               required />
      </div>

      <div class="mb-3">
        <label class="form-label">Total Price:</label>
        <div class="form-control">
          ₱<span id="totalPrice"
                 th:text="${product.price}">0.00</span>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit"
                class="btn btn-success flex-grow-1">
          ✅ Confirm Checkout
        </button>
        <a href="/user/dashboard"
           class="btn btn-secondary flex-grow-1">
          ❌ Cancel
        </a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const price    = parseFloat(document.getElementById('unitPrice').textContent);
      const balance  = parseFloat(document.getElementById('availableBalance').textContent);
      const qtyInput = document.getElementById('quantity');
      const totalEl  = document.getElementById('totalPrice');
      const form     = document.getElementById('checkoutForm');

      function updateTotal() {
        const qty   = parseInt(qtyInput.value) || 0;
        const total = qty * price;
        totalEl.innerText = total.toFixed(2);
        return total;
      }

      qtyInput.addEventListener('input', updateTotal);

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const total = updateTotal();

        // BLOCK if user has no funds OR total exceeds balance
        if (balance <= 0 || total > balance) {
          Swal.fire({
            icon: 'error',
            title: 'inefficient balance',
            text:  'inefficient balance'
          });
          return;
        }

        // Otherwise ask for confirmation
        Swal.fire({
          title: 'Are you sure you want to checkout?',
          text:  `You will be charged ₱${total.toFixed(2)}.`,
          icon:  'question',
          showCancelButton: true,
          confirmButtonColor: '#28a745',
          cancelButtonColor:  '#d33',
          confirmButtonText: 'Yes, checkout',
          cancelButtonText:  'Cancel'
        }).then((result) => {
          if (result.isConfirmed) {
            form.submit();
          }
        });
      });
    });
  </script>

</body>
</html>
