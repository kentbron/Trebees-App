<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard - Trebees Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .balance-card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .nav-buttons a { min-width: 140px; }
        .product-card { transition: transform 0.2s; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center">👋 Welcome, <span th:text="${user.name}">User</span>!</h2>

    <div class="balance-card text-center mb-5">
        <h4>💰 Current Balance</h4>
        <h2>₱<span th:text="${balance}">0.00</span></h2>
    </div>

    <!-- Navigation Buttons -->
    <div class="nav-buttons d-flex justify-content-center gap-3 mb-5">
        <a href="/user/topup" class="btn btn-primary d-flex align-items-center justify-content-center">📥 Top-up</a>
        <a href="/user/orders" class="btn btn-info d-flex align-items-center justify-content-center">🧾 My Orders</a>
        <a href="/logout" class="btn btn-outline-danger d-flex align-items-center justify-content-center">🔴 Logout</a>
    </div>

    <!-- Product Section -->
    <h4 class="text-center mb-4">🛍️ Available Products</h4>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card product-card h-100">
                <img th:src="@{${product.imagePath != null ? product.imagePath : '/uploads/placeholder.jpg'}}"
                     class="card-img-top" alt="Product Image"
                     style="height:250px; object-fit:cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${product.productName}">Product Name</h5>
                    <p class="card-text small" th:text="${product.description}">Product Description</p>
                    <p class="fw-bold">₱<span th:text="${product.price}">0.00</span></p>
                    <div class="mt-auto">
                        <a th:if="${product.isAvailable == 1}"
                           th:href="@{'/user/checkout/' + ${product.productName}}"
                           class="btn btn-success w-100">
                            Checkout
                        </a>
                        <span th:if="${product.isAvailable == 0}"
                              class="badge bg-danger d-block text-center mt-2">
                            Out of Stock
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Fire inefficient balance alert if redirected with ?insufficient_funds -->
<!-- Changes Made by : Hubert Harold P. Plarisan
	Spelling Correction -->
<script th:if="${param.insufficient_funds != null}">
  Swal.fire({
    icon: 'error',
    title: 'insufficient balance',
    text:  'insufficient balance'
  });
</script>

</body>
</html>
