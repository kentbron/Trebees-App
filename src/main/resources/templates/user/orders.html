<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Order History - Trebees Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4">🧾 My Order History</h2>

    <div class="card">
        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th>Order Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.product.productName}">Product Name</td>
                    <td th:text="${order.quantity}">1</td>
                    <td>₱<span th:text="${#numbers.formatDecimal(order.price, 0, 'COMMA', 2, 'POINT')}">0.00</span></td>
                    <td>
                        <span class="badge text-bg-warning" th:if="${order.status == 'Pending Approval'}">Pending</span>
                        <span class="badge text-bg-success" th:if="${order.status == 'Approved'}">Approved</span>
                        <span class="badge text-bg-danger" th:if="${order.status == 'Declined'}">Declined</span>
                    </td>
                    <td th:text="${#temporals.format(order.orderDateTime, 'MMMM dd, yyyy - hh:mm a')}">Order Date</td>
                </tr>
                </tbody>
                <tfoot>
                <tr>
                    <td colspan="2" class="text-end"><strong>Total Pending Amount:</strong></td>
                    <td colspan="3">
                        <strong>₱<span th:text="${#numbers.formatDecimal(totalPendingPayments, 0, 'COMMA', 2, 'POINT')}">0.00</span></strong>
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="mt-4">
        <a href="/user/dashboard" class="btn btn-outline-primary">← Back to Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
