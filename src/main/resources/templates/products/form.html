<!-- src/main/resources/templates/products/form.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${product.productName} != null ? 'Edit Product' : 'Add Product'">
    Product Form
  </title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 th:text="${product.productName} != null ? '✏️ Edit Product' : '+ Add New Product'"></h1>
    <a href="/admin/products" class="btn btn-outline-secondary">← Back to Products</a>
  </div>

  <form th:action="@{/admin/products/save}"
        th:object="${product}"
        method="post"
        enctype="multipart/form-data">

    <!-- LOCKED PK ON EDIT -->
    <div class="mb-3">
      <label for="productName" class="form-label">Product Name</label>
      <input type="text"
             id="productName"
             name="productName"
             th:field="*{productName}"
             class="form-control"
             placeholder="Enter product name"
             required
             th:attr="readonly=${product.productName != null}"/>
    </div>

    <div class="mb-3">
      <label for="price" class="form-label">Price (₱)</label>
      <input type="number"
             id="price"
             name="price"
             th:field="*{price}"
             step="0.01" min="0"
             class="form-control"
             placeholder="Enter price"
             required/>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea id="description"
                name="description"
                th:field="*{description}"
                class="form-control"
                rows="3"
                placeholder="Enter description"></textarea>
    </div>

    <div class="mb-3">
      <label for="imageFile" class="form-label">Product Image</label>
      <input class="form-control"
             type="file"
             id="imageFile"
             name="imageFile"
             accept="image/png, image/jpeg"/>
      <div th:if="${product.imagePath}" class="mt-2">
        <p>Current Image:</p>
        <img th:src="@{${product.imagePath}}"
             alt="Product Image"
             style="width:150px;"/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Availability</label>
      <select class="form-select"
              th:field="*{isAvailable}"
              required>
        <option value="1" th:selected="${product.isAvailable == 1}">Available</option>
        <option value="0" th:selected="${product.isAvailable == 0}">Not Available</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary">Save Product</button>
    <a href="/admin/products" class="btn btn-secondary">Cancel</a>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
