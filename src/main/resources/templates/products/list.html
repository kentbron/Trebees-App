<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Manage Products</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">📦 Manage Products</h1>
    <a href="/admin" class="btn btn-outline-secondary">← Back to Dashboard</a>
  </div>

  <!-- Hidden flash containers -->
  <div th:if="${error}" id="flashError" th:text="${error}" style="display:none;"></div>
  <div th:if="${success}" id="flashSuccess" th:text="${success}" style="display:none;"></div>

  <a href="/admin/products/add" class="btn btn-success mb-3">+ Add New Product</a>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Price (₱)</th>
        <th>Description</th>
        <th>Availability</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="product : ${products}">
        <td><img th:src="@{${product.imagePath}}" style="width:80px" alt="Product Image"/></td>
        <td th:text="${product.productName}">Name</td>
        <td th:text="${product.price}">0.00</td>
        <td th:text="${product.description}">Description</td>
        <td>
          <span th:if="${product.isAvailable == 1}" class="badge bg-success">Available</span>
          <span th:if="${product.isAvailable == 0}" class="badge bg-danger">Not Available</span>
        </td>
        <td>
          <a th:href="@{'/admin/products/edit/name/' + ${product.productName}}"
             class="btn btn-sm btn-warning">Edit</a>
          <a th:href="@{'/admin/products/markUnavailable/' + ${product.productName}}"
             class="btn btn-sm btn-secondary">Mark Unavailable</a>
          <a th:href="@{'/admin/products/markAvailable/' + ${product.productName}}"
             class="btn btn-sm btn-success">Mark Available</a>

          <!-- Delete button with confirmation -->
          <button type="button"
                  class="btn btn-sm btn-danger delete-btn"
                  th:attr="data-href=@{'/admin/products/delete/name/' + ${product.productName}}"
          >Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Show error flash
    const errorDiv = document.getElementById('flashError');
    if (errorDiv && errorDiv.textContent.trim()) {
      Swal.fire({
        icon: 'error',
        title: 'Error',
        text: errorDiv.textContent.trim()
      });
    }

    // Show success flash
    const successDiv = document.getElementById('flashSuccess');
    if (successDiv && successDiv.textContent.trim()) {
      Swal.fire({
        icon: 'success',
        title: 'Success',
        text: successDiv.textContent.trim(),
        timer: 2000,
        showConfirmButton: false
      });
    }

    // Attach delete confirmation
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const href = this.getAttribute('data-href');
        Swal.fire({
          title: 'Are you sure you want to delete this product?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#3085d6',
          confirmButtonText: 'Yes, delete it!'
        }).then((result) => {
          if (result.isConfirmed) {
            window.location.href = href;
          }
        });
      });
    });
  });
</script>
</body>
</html>
